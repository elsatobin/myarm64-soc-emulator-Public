[jobs.default]
command = ["cargo", "clippy", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.check]
command = ["cargo", "check", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.test]
command = ["cargo", "nextest", "run", "--color", "always"]
need_stdout = true

[jobs.doc]
command = ["cargo", "doc", "--no-deps", "--color", "always"]
need_stdout = false

